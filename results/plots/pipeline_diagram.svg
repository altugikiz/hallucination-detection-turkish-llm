<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" style="background:#ffffff;font-family:'Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <linearGradient id="g_input" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="g_models" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="g_judge" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="g_wiki" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="g_out" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="640" y="50" text-anchor="middle" font-size="28" font-weight="700" fill="#1e293b">
    Hallucination Detection Pipeline
  </text>
  <text x="640" y="78" text-anchor="middle" font-size="15" fill="#64748b">
    Turkish LLM Benchmark · 150 questions · 4 models · 2 prompt types
  </text>

  <!-- ── STAGE 1: Question ───────────────────────────────── -->
  <g>
    <rect x="40" y="280" width="180" height="120" rx="14" fill="url(#g_input)"/>
    <text x="130" y="318" text-anchor="middle" font-size="15" font-weight="700" fill="white">STAGE 1</text>
    <text x="130" y="345" text-anchor="middle" font-size="17" font-weight="600" fill="white">Turkish</text>
    <text x="130" y="368" text-anchor="middle" font-size="17" font-weight="600" fill="white">Question</text>
    <text x="130" y="390" text-anchor="middle" font-size="12" fill="#dbeafe">benchmark.json</text>
  </g>

  <!-- arrows from Question to each model -->
  <line x1="220" y1="340" x2="320" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="220" y1="340" x2="320" y2="290" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="220" y1="340" x2="320" y2="400" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="220" y1="340" x2="320" y2="510" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── 4 Models ───────────────────────────────────────── -->
  <g>
    <rect x="320" y="150" width="190" height="60" rx="10" fill="url(#g_models)"/>
    <text x="415" y="180" text-anchor="middle" font-size="14" font-weight="600" fill="white">GPT-4o-mini</text>
    <text x="415" y="198" text-anchor="middle" font-size="11" fill="#ddd6fe">zero + few shot</text>
  </g>
  <g>
    <rect x="320" y="260" width="190" height="60" rx="10" fill="url(#g_models)"/>
    <text x="415" y="290" text-anchor="middle" font-size="14" font-weight="600" fill="white">Llama 3.1</text>
    <text x="415" y="308" text-anchor="middle" font-size="11" fill="#ddd6fe">zero + few shot</text>
  </g>
  <g>
    <rect x="320" y="370" width="190" height="60" rx="10" fill="url(#g_models)"/>
    <text x="415" y="400" text-anchor="middle" font-size="14" font-weight="600" fill="white">Gemini 2.5 Flash Lite</text>
    <text x="415" y="418" text-anchor="middle" font-size="11" fill="#ddd6fe">zero + few shot</text>
  </g>
  <g>
    <rect x="320" y="480" width="190" height="60" rx="10" fill="url(#g_models)"/>
    <text x="415" y="510" text-anchor="middle" font-size="14" font-weight="600" fill="white">Mistral Small</text>
    <text x="415" y="528" text-anchor="middle" font-size="11" fill="#ddd6fe">zero + few shot</text>
  </g>

  <!-- arrows: each model → Response -->
  <line x1="510" y1="180" x2="610" y2="335" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="510" y1="290" x2="610" y2="340" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="510" y1="400" x2="610" y2="345" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="510" y1="510" x2="610" y2="350" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Response box -->
  <g>
    <rect x="610" y="310" width="170" height="70" rx="10" fill="white" stroke="#1e293b" stroke-width="2"/>
    <text x="695" y="337" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Response</text>
    <text x="695" y="358" text-anchor="middle" font-size="11" fill="#64748b">1,200 total</text>
    <text x="695" y="372" text-anchor="middle" font-size="11" fill="#64748b">(150 × 4 × 2)</text>
  </g>

  <!-- arrows: Response → Judge & Wiki -->
  <line x1="780" y1="330" x2="870" y2="225" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="780" y1="360" x2="870" y2="455" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── STAGE 2: Judge & Wiki ──────────────────────────── -->
  <g>
    <rect x="870" y="160" width="220" height="130" rx="14" fill="url(#g_judge)"/>
    <text x="980" y="188" text-anchor="middle" font-size="13" font-weight="700" fill="white">STAGE 2 · Signal A</text>
    <text x="980" y="213" text-anchor="middle" font-size="16" font-weight="700" fill="white">LLM-as-Judge</text>
    <text x="980" y="237" text-anchor="middle" font-size="12" fill="#fef3c7">GPT-4o-mini</text>
    <text x="980" y="257" text-anchor="middle" font-size="11" fill="#fef3c7">strict factuality prompt</text>
    <text x="980" y="276" text-anchor="middle" font-size="11" font-style="italic" fill="#fef3c7">→ CORRECT / INCORRECT</text>
  </g>

  <g>
    <rect x="870" y="400" width="220" height="130" rx="14" fill="url(#g_wiki)"/>
    <text x="980" y="428" text-anchor="middle" font-size="13" font-weight="700" fill="white">STAGE 2 · Signal B</text>
    <text x="980" y="453" text-anchor="middle" font-size="16" font-weight="700" fill="white">Wikipedia Check</text>
    <text x="980" y="477" text-anchor="middle" font-size="12" fill="#d1fae5">keywords → tr.wikipedia</text>
    <text x="980" y="497" text-anchor="middle" font-size="11" fill="#d1fae5">judge re-checks snippet</text>
    <text x="980" y="516" text-anchor="middle" font-size="11" font-style="italic" fill="#d1fae5">→ CORRECT / INCORRECT / UNCERTAIN</text>
  </g>

  <!-- arrows from both signals → final verdict -->
  <line x1="1090" y1="225" x2="1170" y2="320" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1090" y1="465" x2="1170" y2="370" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Final Verdict -->
  <g>
    <rect x="1100" y="300" width="160" height="90" rx="12" fill="url(#g_out)"/>
    <text x="1180" y="328" text-anchor="middle" font-size="13" font-weight="700" fill="white">FINAL</text>
    <text x="1180" y="352" text-anchor="middle" font-size="16" font-weight="700" fill="white">VERDICT</text>
    <text x="1180" y="375" text-anchor="middle" font-size="11" fill="#fee2e2">CORRECT / HALLUCINATION</text>
  </g>

  <!-- ── Legend at bottom ─────────────────────────────── -->
  <g transform="translate(40,620)">
    <rect width="1200" height="70" rx="8" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text x="20" y="28" font-size="13" font-weight="700" fill="#1e293b">Agreement Rule:</text>
    <text x="20" y="50" font-size="12" fill="#475569">
      Judge says INCORRECT  →  HALLUCINATION (unless Wikipedia explicitly says CORRECT)   ·   Judge says CORRECT but Wiki says INCORRECT  →  HALLUCINATION   ·   Otherwise  →  CORRECT
    </text>
  </g>
</svg>
